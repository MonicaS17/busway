<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Selector</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f8fafc;
    }
    /* Estilo del marcador circular */
    .custom-marker {
      background: #0D1B3E;
      border: 3px solid #FFC20A;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      box-shadow: 0 4px 10px rgba(13, 27, 62, 0.3);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Obtener parámetros de inicio
    const urlParams = new URLSearchParams(window.location.search);
    const startLat = parseFloat(urlParams.get('lat')) || 8.9833;
    const startLng = parseFloat(urlParams.get('lng')) || -79.5167;

    const map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    }).setView([startLat, startLng], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    // Icono personalizado premium para el marcador
    const customIcon = L.divIcon({
      className: 'custom-marker',
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    });

    let marker = L.marker([startLat, startLng], { 
      icon: customIcon,
      draggable: true 
    }).addTo(map);

    function sendUpdate(lat, lng) {
      window.parent.postMessage({ lat, lng }, '*');
    }

    map.on('click', function(e) {
      const { lat, lng } = e.latlng;
      marker.setLatLng([lat, lng]);
      sendUpdate(lat, lng);
    });

    marker.on('dragend', function() {
      const { lat, lng } = marker.getLatLng();
      sendUpdate(lat, lng);
    });
  </script>
</body>
</html>
